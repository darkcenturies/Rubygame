# Configuration version – do not modify this value
config_version: 1.6.7

# ──────────────────────────────────────────────────────────────────────────────
#   SmartSpawner – Discord Logging Configuration
#   File: discord_logging.yml
# ──────────────────────────────────────────────────────────────────────────────
#
#   This single file centralises every Discord-related setting:
#     • Connection & global webhook settings  (top-level keys, lines 30–60)
#     • Event filtering                       (logged_events section, lines 62–100)
#     • Per-event embed templates             (event_defaults section, lines 102+)
#
#   HOW TO CREATE A WEBHOOK:
#     1. Open your Discord server settings.
#     2. Go to "Integrations" → "Webhooks" → "New Webhook".
#     3. Choose the target channel, copy the URL and paste into webhook_url below.
#
# ──────────────────────────────────────────────────────────────────────────────

# ── Connection ────────────────────────────────────────────────────────────────

# Enable / disable Discord webhook delivery entirely.
enabled: false

# The webhook URL obtained from Discord (required when enabled: true).
webhook_url: ""

# Show the acting player's Minecraft head as the embed thumbnail.
show_player_head: true

# ── Event Filtering ───────────────────────────────────────────────────────────

# If true, every logged event is forwarded to Discord (logged_events list is
# ignored when this is true).
log_all_events: false

# Specific events to forward when log_all_events is false.
# Available event names:
#   SPAWNER_PLACE, SPAWNER_BREAK, SPAWNER_EXPLODE
#   SPAWNER_STACK_HAND, SPAWNER_STACK_GUI, SPAWNER_DESTACK_GUI
#   SPAWNER_GUI_OPEN, SPAWNER_STORAGE_OPEN, SPAWNER_STACKER_OPEN
#   SPAWNER_EXP_CLAIM, SPAWNER_SELL_ALL
#   SPAWNER_ITEM_TAKE_ALL, SPAWNER_ITEM_DROP, SPAWNER_ITEMS_SORT
#   SPAWNER_ITEM_FILTER, SPAWNER_DROP_PAGE_ITEMS
#   SPAWNER_EGG_CHANGE
#   COMMAND_EXECUTE_PLAYER, COMMAND_EXECUTE_CONSOLE, COMMAND_EXECUTE_RCON
logged_events:
  - SPAWNER_PLACE
  - SPAWNER_BREAK
  - SPAWNER_EXPLODE
  - SPAWNER_STACK_HAND
  - SPAWNER_STACK_GUI
  - SPAWNER_DESTACK_GUI
  - SPAWNER_GUI_OPEN
  - COMMAND_EXECUTE_PLAYER
  - COMMAND_EXECUTE_CONSOLE
  - COMMAND_EXECUTE_RCON

# ── Per-Event Embed Configuration ──────────────────────────────────────────────────
#
#   Edit the embed blocks below to customise each event's appearance.
#
#   Supported placeholders (common to all events):
#     {player}        – Player name  (N/A for console / explosion events)
#     {player_uuid}   – Player UUID
#     {description}   – Human-readable event description
#     {event_type}    – Raw event name (e.g. SPAWNER_PLACE)
#     {time}          – HH:mm:ss
#     {timestamp}     – ISO 8601  (Discord native date field)
#     {location}      – "world (x, y, z)"
#     {world} {x} {y} {z}
#     {entity}        – Mob / entity name
#     {color}         – Decimal colour integer for this event
#     + any metadata key logged by the event (see each event block for specifics)
#

SPAWNER_PLACE:
  embed:
    title: "✅ Spawner Placed"
    description: "**{player}** placed a **{entity}** spawner"
    color: "57F287"
    footer: "SmartSpawner • {time}"
    fields:
      - name: "📍 Location"
        value: "`{location}`"
        inline: false
      - name: "🐾 Entity"
        value: "`{entity}`"
        inline: true
      - name: "🔢 Quantity"
        value: "`{quantity}`"
        inline: true

