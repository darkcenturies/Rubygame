  - '  &#bdc3c7•  ꜱᴛᴀᴄᴋ: &#3498db{stack_size}'
  - '  &#bdc3c7•  ʀᴀɴɢᴇ: &#3498db{range} &#bdc3c7ʙʟᴏᴄᴋꜱ'
