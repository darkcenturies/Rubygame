  invalid_item_type:
    message: '&#ff5252ʟᴏạɪ ᴠậᴛ ᴘʜẩᴍ ᴋʜôɴɢ ʜợᴘ ʟệ'
    sound: block.note_block.pling
  invalid_item_spawner:
    message: '&#ff5252ʟᴏạɪ ꜱᴘᴀᴡɴᴇʀ ᴠậᴛ ᴘʜẩᴍ ᴋʜôɴɢ ʜợᴘ ʟệ'
