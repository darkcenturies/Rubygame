  spawner_given:
    message: '&#37eb9ađã ᴄʜᴏ &#f8f8ff{amount} ꜱᴘᴀᴡɴᴇʀ {ᴇɴᴛɪᴛʏ} &#37eb9aᴄʜᴏ &#f8f8ff{player}'
