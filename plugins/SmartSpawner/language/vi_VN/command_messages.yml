# Configuration version – do not modify this value
language_version: 1.6.7

# SmartSpawner – command_messages.yml
# Messages related to plugin commands, including usage instructions and error messages.

player_only:
  message: '&#ff5252ʟệɴʜ ɴàʏ ᴄʜỉ ᴅàɴʜ ᴄʜᴏ ɴɢườɪ ᴄʜơɪ.'
  sound: block.note_block.bass

no_permission:
  message: '&#ff5252ʙạɴ ᴋʜôɴɢ ᴄó ǫᴜʏềɴ ᴛʜựᴄ ʜɪệɴ đɪềᴜ ɴàʏ'
  sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                        /ss set
# ──────────────────────────────────────────────────────
set:
  usage:
    message: '&#ff5252Cách dùng: &#f8f8ff/ss set <stack_size|range|delay> <giá_trị>
      [world x y z]'
    sound: block.note_block.hat
  invalid:
    message: '&#ff5252Giá trị hoặc vị trí SmartSpawner không hợp lệ.'
    sound: block.note_block.pling
  stack_size_exceeds_max:
    message: '&#ff5252Stack size &#f8f8ff{value} &#ff5252vượt quá max stack size của
      spawner này: &#f8f8ff{max}'
    sound: block.note_block.pling
  location_required:
    message: '&#ff5252Console phải nhập vị trí: &#f8f8ff/ss set <stack_size|range|delay>
      <giá_trị> <world> <x> <y> <z>'
    sound: block.note_block.pling
  success:
    message: '&#37eb9aĐã set &#f8f8ff{property} &#37eb9atừ &#f8f8ff{old_value} &#37eb9athành
      &#f8f8ff{new_value} &#37eb9atại &#f8f8ff{world} {x} {y} {z}&#37eb9a.'
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                        /ss near
# ──────────────────────────────────────────────────────
near:
  bossbar:
    analyzing: 🔍 ᴀɴᴀʟʏᴢɪɴɢ... {percent}%
    found: ✓ ᴛìᴍ ᴛʜấʏ {count} ꜱᴘᴀᴡɴᴇʀ ᴛʀᴏɴɢ ᴘʜạᴍ ᴠɪ {radius} ʙʟᴏᴄᴋ
    not_found: ✗ ᴋʜôɴɢ ᴛìᴍ ᴛʜấʏ ꜱᴘᴀᴡɴᴇʀ ᴛʀᴏɴɢ ᴘʜạᴍ ᴠɪ {radius} ʙʟᴏᴄᴋ
  view_gui:
    button: '[xᴇᴍ ᴛʀᴏɴɢ ɢᴜɪ]'
    hover: Nhấn để xem {count} spawner(s) tìm được
  scan_start:
    message: '&#3498db🔍 đᴀɴɢ ǫᴜéᴛ sᴘᴀᴡɴᴇʀ ᴛʀᴏɴɢ ᴘʜạᴍ ᴠɪ &#f8f8ff{radius} &#3498dbʙʟᴏᴄᴋ…'
    sound: block.note_block.hat
  scan_found:
    message: '&#37eb9a✓ ᴛìᴍ ᴛʜấʏ &#f8f8ff{count} &#37eb9asᴘᴀᴡɴᴇʀ ᴛʀᴏɴɢ ᴘʜạᴍ ᴠɪ &#f8f8ff{radius}
      &#37eb9aʙʟᴏᴄᴋ. &#f1c40fHɪɢʜʟɪɢʜᴛ ᴛồɴ ᴛạɪ &#f8f8ff30 ɢɪâʏ&#f1c40f.'
    sound: entity.experience_orb.pickup
  scan_none:
    message: '&#ff5252✗ ᴋʜôɴɢ ᴛìᴍ ᴛʜấʏ sᴘᴀᴡɴᴇʀ ɴàᴏ ᴛʀᴏɴɢ ᴘʜạᴍ ᴠɪ &#f8f8ff{radius}
      &#ff5252ʙʟᴏᴄᴋ.'
    sound: block.note_block.pling
  scan_cancelled:
    message: '&#f1c40f⊘ đã ʜủʏ ǫᴜéᴛ & xóᴀ ᴄáᴄ ʜɪɢʜʟɪɢʜᴛ.'
    sound: block.note_block.bass
  no_active_scan:
    message: '&#ff5252ʙạɴ ᴋʜôɴɢ ᴄó ʟầɴ ǫᴜéᴛ ɴàᴏ đᴀɴɢ ᴄʜạʏ.'
    sound: block.note_block.bass
  highlights_expired:
    message: '&#888888⏱ ʜɪɢʜʟɪɢʜᴛ sᴘᴀᴡɴᴇʀ đã ʜếᴛ ʜạɴ.'


