# Configuration version вҖ“ do not modify this value
language_version: 1.6.7

# SmartSpawner вҖ“ items.yml
# Spawner item display names and drop item names.

custom_item:
  # Appearance of smart spawner items in inventory and tooltips
  spawner:
    name: '&#3498db{бҙҮЙҙбҙӣЙӘбҙӣКҸ} кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖ'
    loot_items: '  &#ecf0f1вҖў  {amount} {item_name} &#3498db({chance}%)'
    loot_items_empty: '  &#ecf0f1вҖў  ЙҙбҙҸЙҙбҙҮ'
    lore:
    - ''
    - '&#3498dbв—Ҳ &#3498dbбҙ…бҙҮбҙӣбҙҖЙӘКҹкңұ:'
    - '  &#ecf0f1вҖў  бҙҮxбҙҳбҙҮКҖЙӘбҙҮЙҙбҙ„бҙҮ ЙўЙӘбҙ бҙҮ: &#3498db{exp}'
    - ''
    - '&#3498dbв—Ҳ &#3498dbбҙ…КҖбҙҸбҙҳкңұ:'
    - '{loot_items}'
    - ''
  
  # Appearance of item spawner items in inventory and tooltips
  item_spawner:
    name: '&#3498db{бҙҮЙҙбҙӣЙӘбҙӣКҸ} кңұбҙҳбҙҖбҙЎЙҙбҙҮКҖ'
    loot_items: '  &#ecf0f1вҖў  {amount} {item_name} &#3498db({chance}%)'
    loot_items_empty: '  &#ecf0f1вҖў  ЙҙбҙҸЙҙбҙҮ'
    lore:
    - ''
    - '&#3498dbв—Ҳ &#3498dbбҙ…бҙҮбҙӣбҙҖЙӘКҹкңұ:'
    - '  &#ecf0f1вҖў  бҙҮxбҙҳбҙҮКҖЙӘбҙҮЙҙбҙ„бҙҮ ЙўЙӘбҙ бҙҮ: &#3498db{exp}'
    - ''
    - '&#3498dbв—Ҳ &#3498dbбҙ…КҖбҙҸбҙҳкңұ:'
    - '{loot_items}'
    - ''
  
  # Appearance of vanilla spawner items in inventory and tooltips
  # Available placeholders: {entity}, {бҙҮЙҙбҙӣЙӘбҙӣКҸ}
  # Delete this section if you don't want to use custom vanilla spawners name and lore
  vanilla_spawner:
    name: '{entity} Spawner'
