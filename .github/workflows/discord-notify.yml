name: Discord commit notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != ''
    steps:
      - name: Post commit as your Discord bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          if [ -z "$DISCORD_BOT_TOKEN" ] || [ -z "$DISCORD_CHANNEL_ID" ]; then
            echo "Set DISCORD_BOT_TOKEN and DISCORD_CHANNEL_ID in repo secrets (same bot as EssentialsDiscord)."
            exit 0
          fi
          COMMIT='${{ toJSON(github.event.head_commit) }}'
          MSG=$(echo "$COMMIT" | jq -r '.message')
          AUTHOR=$(echo "$COMMIT" | jq -r '.author.name')
          URL=$(echo "$COMMIT" | jq -r '.url')
          jq -n \
            --arg title "Rubygame — new commit pushed" \
            --arg desc "$MSG" \
            --arg author "$AUTHOR" \
            --arg url "$URL" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 5814783,
                fields: [
                  {name: "Author", value: $author, inline: true},
                  {name: "Branch", value: "main", inline: true},
                  {name: "Commit", value: ($sha[0:7]), inline: true}
                ],
                footer: {text: ($repo + " · SFTP deploy may run next")}
              }]
            }' > payload.json
          HTTP=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "https://discord.com/api/v10/channels/${DISCORD_CHANNEL_ID}/messages" \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "Discord API error HTTP $HTTP"
            cat response.json
            exit 1
          fi
          echo "Posted to Discord channel $DISCORD_CHANNEL_ID as your bot."
