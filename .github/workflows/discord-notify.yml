name: Discord commit notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != ''
    steps:
      - name: Post commit to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set — skip (add webhook in repo secrets)."
            exit 0
          fi
          jq -n \
            --arg title "Rubygame — new commit" \
            --arg desc "${{ github.event.head_commit.message }}" \
            --arg author "${{ github.event.head_commit.author.name }}" \
            --arg url "${{ github.event.head_commit.html_url }}" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 5814783,
                fields: [
                  {name: "Author", value: $author, inline: true},
                  {name: "Branch", value: "main", inline: true},
                  {name: "Commit", value: ($sha[0:7]), inline: true}
                ],
                footer: {text: ($repo + " · plugins deploy may follow")}
              }]
            }' | curl -fsS -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
