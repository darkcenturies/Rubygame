name: Deploy plugins to Shockbyte

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/deploy-shockbyte.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugins folder via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          port: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
          username: ${{ secrets.SHOCKBYTE_SFTP_USER }}
          password: ${{ secrets.SHOCKBYTE_SFTP_PASSWORD }}
          localPath: ./plugins/
          remotePath: /plugins/
          sftpOnly: true
