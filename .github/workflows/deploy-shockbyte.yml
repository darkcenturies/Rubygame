name: Deploy plugins to Shockbyte

concurrency:
  group: shockbyte-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/deploy-shockbyte.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SFTP port reachable
        env:
          SHOCKBYTE_SFTP_HOST: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          SHOCKBYTE_SFTP_PORT: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
        run: |
          set -e
          if [ -z "$SHOCKBYTE_SFTP_HOST" ] || [ -z "$SHOCKBYTE_SFTP_PORT" ]; then
            echo "Missing SHOCKBYTE_SFTP_HOST or SHOCKBYTE_SFTP_PORT secrets."
            exit 1
          fi
          timeout 15 bash -c "until echo > /dev/tcp/${SHOCKBYTE_SFTP_HOST}/${SHOCKBYTE_SFTP_PORT}; do sleep 1; done"
          echo "Port ${SHOCKBYTE_SFTP_PORT} is reachable from GitHub."

      - name: Deploy (lftp mirror)
        id: lftp_mirror
        continue-on-error: true
        timeout-minutes: 40
        env:
          SHOCKBYTE_SFTP_HOST: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          SHOCKBYTE_SFTP_PORT: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
          SHOCKBYTE_SFTP_USER: ${{ secrets.SHOCKBYTE_SFTP_USER }}
          SHOCKBYTE_SFTP_PASSWORD: ${{ secrets.SHOCKBYTE_SFTP_PASSWORD }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          cat > ~/.netrc <<EOF
          machine ${SHOCKBYTE_SFTP_HOST}
          login ${SHOCKBYTE_SFTP_USER}
          password ${SHOCKBYTE_SFTP_PASSWORD}
          port ${SHOCKBYTE_SFTP_PORT}
          EOF
          chmod 600 ~/.netrc
          lftp sftp://${SHOCKBYTE_SFTP_HOST}:${SHOCKBYTE_SFTP_PORT} -e "set sftp:auto-confirm yes; mkdir -f plugins; mirror -R --parallel=4 --verbose ./plugins ./plugins; quit"

      - name: Deploy (wlixcc server root)
        id: wlixcc_root
        if: steps.lftp_mirror.outcome == 'failure'
        continue-on-error: true
        timeout-minutes: 40
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          port: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
          username: ${{ secrets.SHOCKBYTE_SFTP_USER }}
          password: ${{ secrets.SHOCKBYTE_SFTP_PASSWORD }}
          local_path: ./plugins/
          remote_path: .
          sftp_only: true
          sftpArgs: -o ConnectTimeout=30

      - name: Deploy result
        run: |
          echo "lftp_mirror: ${{ steps.lftp_mirror.outcome }}"
          echo "wlixcc_root: ${{ steps.wlixcc_root.outcome }}"
          if [ "${{ steps.lftp_mirror.outcome }}" != "success" ] && [ "${{ steps.wlixcc_root.outcome }}" != "success" ]; then
            echo "GitHub deploy failed. Use local: .\\deploy.ps1 after filling .deploy.env"
            exit 1
          fi
          echo "Deploy succeeded."
