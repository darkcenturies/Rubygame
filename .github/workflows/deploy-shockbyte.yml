# GitHub -> Shockbyte SFTP does not work (Shockbyte "agent" paths). Deploy from your PC instead.
name: Deploy plugins to Shockbyte (local only)

on:
  workflow_dispatch:

jobs:
  local-deploy-only:
    runs-on: ubuntu-latest
    steps:
      - name: Use WinSCP on your PC
        run: |
          echo "Shockbyte blocks cloud SFTP uploads to Rubygame/ (agent path error)."
          echo "On your PC after git push, run:  .\\deploy.ps1"
          echo "Requires: WinSCP + .deploy.env with SFTP credentials."
          exit 0
