name: Deploy plugins to Shockbyte

concurrency:
  group: shockbyte-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/workflows/deploy-shockbyte.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SFTP port reachable
        env:
          SHOCKBYTE_SFTP_HOST: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          SHOCKBYTE_SFTP_PORT: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
        run: |
          set -e
          if [ -z "$SHOCKBYTE_SFTP_HOST" ] || [ -z "$SHOCKBYTE_SFTP_PORT" ]; then
            echo "Missing SHOCKBYTE_SFTP_HOST or SHOCKBYTE_SFTP_PORT secrets."
            exit 1
          fi
          timeout 15 bash -c "until echo > /dev/tcp/${SHOCKBYTE_SFTP_HOST}/${SHOCKBYTE_SFTP_PORT}; do sleep 1; done"
          echo "Port ${SHOCKBYTE_SFTP_PORT} is reachable from GitHub."

      - name: List remote SFTP root
        env:
          SHOCKBYTE_SFTP_HOST: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          SHOCKBYTE_SFTP_PORT: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
          SHOCKBYTE_SFTP_USER: ${{ secrets.SHOCKBYTE_SFTP_USER }}
          SHOCKBYTE_SFTP_PASSWORD: ${{ secrets.SHOCKBYTE_SFTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass openssh-client
          export SSHPASS="${SHOCKBYTE_SFTP_PASSWORD}"
          printf '%s\n' 'pwd' 'ls -la' 'bye' | sshpass -e sftp -P "${SHOCKBYTE_SFTP_PORT}" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${SHOCKBYTE_SFTP_USER}@${SHOCKBYTE_SFTP_HOST}" || true

      - name: Deploy plugins (sftp put with plugins/ prefix)
        timeout-minutes: 55
        env:
          SHOCKBYTE_SFTP_HOST: ${{ secrets.SHOCKBYTE_SFTP_HOST }}
          SHOCKBYTE_SFTP_PORT: ${{ secrets.SHOCKBYTE_SFTP_PORT }}
          SHOCKBYTE_SFTP_USER: ${{ secrets.SHOCKBYTE_SFTP_USER }}
          SHOCKBYTE_SFTP_PASSWORD: ${{ secrets.SHOCKBYTE_SFTP_PASSWORD }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass openssh-client
          BATCH=$(mktemp)
          find plugins -type f | sort | while IFS= read -r f; do
            rel="${f#plugins/}"
            rdir=$(dirname "plugins/$rel")
            if [ "$rdir" != "plugins" ] && [ "$rdir" != "plugins/." ]; then
              echo "-mkdir $rdir"
            fi
            echo "put $f plugins/$rel"
          done >> "$BATCH"
          echo "bye" >> "$BATCH"
          echo "Uploading $(grep -c '^put ' "$BATCH") files to plugins/..."
          export SSHPASS="${SHOCKBYTE_SFTP_PASSWORD}"
          sshpass -e sftp -P "${SHOCKBYTE_SFTP_PORT}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -b "$BATCH" \
            "${SHOCKBYTE_SFTP_USER}@${SHOCKBYTE_SFTP_HOST}"
          echo "Deploy succeeded."
